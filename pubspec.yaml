name: app2gong
description: 2공 - 2분 공부 앱. 짧은 강의로 효율적인 학습을 제공하는 교육 플랫폼.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # Navigation
  go_router: 14.8.1

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # Networking
  http: 1.5.0

  # UI
  cached_network_image: 3.4.1
  shimmer: 3.0.0
  flutter_rating_bar: 4.0.1
  percent_indicator: 4.2.3
  fl_chart: 0.71.0

  # Media
  video_player: 2.9.5
  chewie: 1.8.5
  webview_flutter: 4.13.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: 0.0.8

  # Utils
  intl: 0.19.0
  # timeago removed - using intl directly for time formatting
  url_launcher: 6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
